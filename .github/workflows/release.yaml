name: Build and Release econfixer

on:
  # Automatically run when a new git tag is pushed (e.g. v1.0.0)
  release:
    types: [created]
  
  # Manual trigger from GitHub UI – you can specify the version number
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v2.3.4)'
        required: true
        default: ''

env:
  GO_VERSION: '1.22'          # Use latest stable Go; change as needed
  OS_NAME_MAP: |              # For naming release assets
    windows-2022=windows-amd64.exe
    macos-14=darwin-amd64
    ubuntu-latest=linux-amd64

jobs:
  create-release:
    name: Create or Get Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Determine the release version: use git tag if available, otherwise manual input
      - name: Set Release Version
        run: |
          # If triggered by a push with a tag, github.ref_name contains "refs/tags/<tag>"
          # Otherwise (manual dispatch) use the user-provided version.
          VERSION="${{ github.event.inputs.version || startsWith(github.ref_name, 'refs/tags/') && github.ref_name[8:] || '' }}"
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Get or Create Release
        uses: actions/github-script@v6
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const version = process.env.RELEASE_VERSION || '';
            
            if (!version) {
              console.log('No release version specified, skipping.');
              return;
            }

            // Check if a tag with this name exists in the repository
            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${version}` });
              const tagExists = true;
            } catch (err) {
              console.log(`Tag ${version} not found – creating new release.`);
              const tagExists = false;
            }

            let releaseId = null;
            let uploadUrl = null;

            if (!tagExists) {
              // No existing tag/release for this version → create a draft release
              console.log('Creating a new draft release');
              const newRelease = await github.rest.releases.createRelease({
                owner, repo,
                tag_name: version,
                name: version,
                draft: true
              });
              releaseId = newRelease.data.id;
              uploadUrl = `${newRelease.data.upload_url}`; // full uploads URL from GitHub API
            } else {
              try {
                const existingReleases = await github.rest.releases.getByTag({ owner, repo, tag: version });
                if (existingReleases.data.length > 0) {
                  releaseId = existingReleases.data[0].id;
                  // Fetch full details to get the upload URL
                  const releaseData = await github.rest.releases.getRelease({ owner, repo, release_id: releaseId });
                  uploadUrl = releaseData.data.upload_url;
                } else {
                  console.log('No existing release for tag, creating new one');
                  const newRelease = await github.rest.releases.createRelease({
                    owner, repo,
                    tag_name: version,
                    name: version,
                    draft: true
                  });
                  releaseId = newRelease.data.id;
                  uploadUrl = `${newRelease.data.upload_url}`;
                }
              } catch (err) {
                console.log('Error fetching existing releases:', err.message);
                // Fallback to creating a new release if getByTag fails
                const newRelease = await github.rest.releases.createRelease({
                  owner, repo,
                  tag_name: version,
                  name: version,
                  draft: true
                });
                releaseId = newRelease.data.id;
                uploadUrl = `${newRelease.data.upload_url}`;
              }
            }

            if (releaseId) {
              core.exportVariable('RELEASE_ID', releaseId);
              console.log(`Using release ID ${releaseId} with upload URL ${uploadUrl}`);
            } else {
              throw new Error(`Could not obtain a valid release for version "${version}"`);
            }

      - name: Export Release Info for Later Jobs
        run: |
          echo "RELEASE_ID=${{ env.RELEASE_ID }}" >> $GITHUB_ENV
          echo "UPLOAD_URL=${{ env.UPLOAD_URL }}" >> $GITHUB_ENV
        # We do this explicitly because GitHub Script does not automatically export all variables to the workflow environment

  build-and-upload:
    name: Build and Upload on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14, windows-2022]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Set up Go (version can be overridden by workflow input or env)
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # Cross-compile the binary for each target OS/architecture
      - name: Build Binary
        run: |
          if [ "${{ matrix.os }}" == "windows-2022" ]; then
            echo "Building Windows amd64..."
            GOOS=windows GOARCH=amd64 go build -o econfixer.exe ./econfixer.go
          elif [ "${{ matrix.os }}" == "macos-14" ]; then
            echo "Building macOS amd64..."
            GOOS=darwin GOARCH=amd64 go build -o econfixer ./econfixer.go
          else # ubuntu-latest
            echo "Building Linux amd64..."
            GOOS=linux GOARCH=amd64 go build -o econfixer ./econfixer.go
          fi

      # Upload the compiled binary as a release asset
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1.0.2
        with:
          upload_url: ${{ env.UPLOAD_URL }}
          asset_path: ./econfixer$([ "${{ matrix.os }}" == "windows-2022" ] && echo ".exe")
          asset_name: econfixer-${{ matrix.os }}-amd64$([ "${{ matrix.os }}" == "windows-2022" ] && echo ".exe")
          asset_content_type: application/octet-stream

  publish-release:
    name: Publish Release (make it live)
    runs-on: ubuntu-latest
    needs: build-and-upload
    if: always() # Run only after all builds, even if some fail (user can decide to ignore failures)
    steps:
      - name: Mark Release as Published
        uses: actions/github-script@v6
        with:
          script: |
            const releaseId = process.env.RELEASE_ID;
            if (!releaseId) {
              console.log('RELEASE_ID not set – skipping publish');
              return;
            }

            try {
              await github.rest.releases.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: parseInt(releaseId),
                data: { draft: false }
              });
              console.log(`Release ${releaseId} is now published (no longer draft)`);
            } catch (err) {
              console.error('Failed to publish release:', err.message);
              // Do not fail the workflow unless you want to; just log
            }
